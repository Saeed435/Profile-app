<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A clean and polished to-do list app built with HTML, CSS, and JavaScript.">
    <title>My Tasks | To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="todo-shell">
        <section class="todo-card">
            <header class="todo-header">
                <div>
                    <p class="eyebrow">Focus board</p>
                    <h1>My Tasks</h1>
                </div>
                <p id="task-counter" class="task-counter">0 of 0 tasks completed</p>
            </header>

            <form id="todo-form" class="todo-form">
                <label class="sr-only" for="todo-input">Add a new task</label>
                <input type="text" id="todo-input" placeholder="Add a new task..." required autocomplete="off">
                <button type="submit" class="add-btn">Add Task</button>
            </form>

            <div class="filters-container" aria-label="Task filters">
                <button type="button" class="filter-btn active-filter" data-filter="all">All</button>
                <button type="button" class="filter-btn" data-filter="active">Active</button>
                <button type="button" class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

            <footer class="footer">
                <p>&copy; 2026 My To-Do List App</p>
            </footer>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
